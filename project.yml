name: SermonPrep
options:
  bundleIdPrefix: com.sermonprep
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  defaultConfig: Debug
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  SermonPrep:
    type: application
    platform: [iOS, macOS]
    deploymentTarget:
      iOS: "17.0"
      macOS: "14.0"
    sources:
      - path: SermonPrep
        excludes:
          - "Resources/Assets.xcassets"
    resources:
      - path: SermonPrep/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sermonprep.app
        INFOPLIST_FILE: SermonPrep/Info.plist
        CODE_SIGN_ENTITLEMENTS: SermonPrep/SermonPrep.entitlements
        DEVELOPMENT_TEAM: ""
        ENABLE_PREVIEWS: YES
    entitlements:
      path: SermonPrep/SermonPrep.entitlements
    capabilities:
      iCloud:
        cloudKit: true
      push-notifications: {}
    info:
      path: SermonPrep/Info.plist
      properties:
        CFBundleDisplayName: SermonPrep
        UILaunchScreen:
          UIColorName: ""
        NSUbiquitousContainers:
          iCloud.com.sermonprep.app:
            NSUbiquitousContainerIsDocumentScopePublic: true
            NSUbiquitousContainerName: SermonPrep
            NSUbiquitousContainerSupportedFolderLevels: Any
